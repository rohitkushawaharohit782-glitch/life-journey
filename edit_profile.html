<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | Life Journey</title>
    <style>
        :root {
            --pink: #ff007f;
            --gold: #ffd700;
            --dark-bg: #0b0c10;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: radial-gradient(circle at top, #1a1a1a, var(--dark-bg));
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .edit-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 28px;
            margin-bottom: 30px;
            background: linear-gradient(to right, var(--pink), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .profile-preview-container {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
        }

        .profile-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--pink);
            padding: 5px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
            transition: 0.3s;
        }

        .upload-label {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--pink);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px solid var(--dark-bg);
            font-size: 18px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #333;
            color: white;
            border-radius: 15px;
            box-sizing: border-box;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--pink);
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        .btn-save {
            width: 100%;
            background: linear-gradient(45deg, var(--pink), #ff4d94);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(255, 0, 127, 0.3);
            transition: 0.3s;
        }

        .btn-save:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(255, 0, 127, 0.5);
        }

        .back-btn {
            display: inline-block;
            margin-top: 25px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: white;
        }

        /* Hide Default File Input */
        #profile_pic { display: none; }
    </style>
</head>
<body>

    <div class="edit-card">
        <h2>Update Profile</h2>
        
        <form action="/edit_profile" method="POST" enctype="multipart/form-data">
            
            <div class="profile-preview-container">
                <img src="/static/uploads/{{ user.profile_pic }}" id="preview" class="profile-preview">
                <label for="profile_pic" class="upload-label">📷</label>
                <input type="file" name="profile_pic" id="profile_pic" accept="image/*" onchange="previewImage(event)">
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" value="{{ user.username }}" placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label>Your Bio</label>
                <textarea name="bio" rows="4" placeholder="Share your vibe...">{{ user.bio }}</textarea>
            </div>

            <button type="submit" class="btn-save">Save Changes ✨</button>
        </form>

        <a href="/" class="back-btn">← Back to Journey</a>
    </div>

    <script>
        function previewImage(event) {
            var reader = new FileReader();
            reader.onload = function() {
                var output = document.getElementById('preview');
                output.src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
</body>
</html>
