<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Journey | Life Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff007f;
            --bright-silver: #e0e0e0;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --border-glass: rgba(255, 255, 255, 0.15);
            --bg-deep: #050609;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--bright-silver);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .recovery-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-glass);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .icon-box {
            font-size: 50px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--neon-pink));
        }

        h2 {
            color: #fff;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        p {
            font-size: 13px;
            color: #888;
            margin-bottom: 25px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            color: var(--neon-pink);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-glass);
            color: white;
            padding: 14px;
            border-radius: 12px;
            outline: none;
            box-sizing: border-box;
            font-family: inherit;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--neon-pink);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.2);
        }

        .btn-recover {
            width: 100%;
            background: var(--neon-pink);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(255, 0, 127, 0.3);
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-recover:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.5);
        }

        .footer-links {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        .footer-links a {
            color: #555;
            text-decoration: none;
            transition: 0.3s;
        }

        .footer-links a:hover { color: var(--bright-silver); }
    </style>
</head>
<body>

    <div class="recovery-card">
        <div class="icon-box">🔐</div>
        <h2>Reset Access</h2>
        <p>Enter your details to regain your journey.</p>

        <form action="/forgot_password" method="POST">
            <div class="form-group">
                <label>Registered Email</label>
                <input type="email" name="email" placeholder="example@gmail.com" required>
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-recover">Update Password</button>
        </form>

        <div class="footer-links">
            <a href="/login">← Back to Login</a>
            <a href="/register">Create Account</a>
        </div>
    </div>

</body>
</html>
