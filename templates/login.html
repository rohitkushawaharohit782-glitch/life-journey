<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Life Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff007f; --bright-silver: #e0e0e0; --glass-bg: rgba(255, 255, 255, 0.08); --bg-deep: #050609; }
        body { background-color: var(--bg-deep); color: var(--bright-silver); font-family: 'Poppins', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-card { background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.15); padding: 40px; border-radius: 30px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .logo { font-size: 32px; font-weight: 900; color: var(--neon-pink); text-shadow: 0 0 10px rgba(255, 0, 127, 0.5); margin-bottom: 30px; }
        input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 14px; border-radius: 12px; margin-bottom: 20px; outline: none; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255, 0, 127, 0.2); }
        .btn-auth { width: 100%; background: var(--neon-pink); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 15px rgba(255, 0, 127, 0.3); transition: 0.3s; }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 0, 127, 0.5); }
        .links { margin-top: 25px; display: flex; justify-content: space-between; font-size: 12px; }
        a { color: #888; text-decoration: none; transition: 0.3s; }
        a:hover { color: var(--neon-pink); }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">Life Journey</div>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-auth">Login</button>
        </form>
        <div class="links">
            <a href="/register">Create Account</a>
            <a href="/forgot_password" style="color: var(--neon-pink);">Forgot Password?</a>
        </div>
    </div>
</body>
</html>
